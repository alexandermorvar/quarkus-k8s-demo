# =========================
# PostgreSQL
# =========================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=quarkus
quarkus.datasource.password=quarkus123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/personasdb

# =========================
# PostgreSQL
# =========================

#quarkus.datasource.db-kind=postgresql
