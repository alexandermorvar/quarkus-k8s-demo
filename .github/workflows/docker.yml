name: Build, Test, Publish & Deploy

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run tests
        run: ./mvnw clean verify

      - name: Build & Push Docker image
        env:
          QUARKUS_CONTAINER_IMAGE_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          QUARKUS_CONTAINER_IMAGE_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          ./mvnw package \
            -DskipTests \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=true \
            -Dquarkus.container-image.registry=docker.io \
            -Dquarkus.container-image.group=chrisqhapaq \
            -Dquarkus.container-image.name=quarkus-k8s-demo \
            -Dquarkus.container-image.tag=${{ github.sha }}

      - name: Update Helm values.yaml
        run: |
          sed -i "s|tag: .*|tag: \"${{ github.sha }}\"|" helm/quarkus/values.yaml

      - name: Commit updated values.yaml
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add helm/quarkus/values.yaml

          git diff --cached --quiet && exit 0

          git commit -m "Update image to ${{ github.sha }}"

          git push