name: Build and Deploy

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build
        run: mvn clean package -DskipTests

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build \
            -t serafan/quarkus-k8s-demo:${{ github.sha }} \
            -t serafan/quarkus-k8s-demo:latest .

      - name: Push Image
        run: |
          docker push serafan/quarkus-k8s-demo:${{ github.sha }}
          docker push serafan/quarkus-k8s-demo:latest

      - name: Update Helm values
        run: |
          sed -i 's/tag:.*/tag: "${{ github.sha }}"/' helm/quarkus/values.yaml

      - name: Commit Helm
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add helm/quarkus/values.yaml

          git commit -m "Update image to ${{ github.sha }}" || exit 0

          git push